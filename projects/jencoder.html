<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jencoder</title>

<style>
  body {
    background: #fff;
    color: #000;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .app {
    width: 520px;
    text-align: center;
  }

  textarea {
    width: 100%;
    height: 120px;
    margin: 10px 0;
    padding: 12px;
    border: 1px solid #000;
    font-family: inherit;
    resize: none;
  }

  button {
    padding: 10px 18px;
    margin: 5px;
    border: 1px solid #000;
    background: #000;
    color: #fff;
    cursor: pointer;
  }

  button:hover {
    background: #fff;
    color: #000;
  }
</style>
</head>
<body>

<div class="app">
  <h2>Jencoder</h2>

  <textarea id="input" placeholder="Enter text or code..."></textarea>

  <div>
    <button onclick="encode()">Encode</button>
    <button onclick="decode()">Decode</button>
  </div>

  <textarea id="output" placeholder="Result..."></textarea>
</div>

<script>
const alphabet = "abcdefghijklmnopqrstuvwxyz";

// VALID COMMA FORMAT CHECK
function isValidCommaNumber(str) {
  return /^\d{1,3}(,\d{3})+$/.test(str);
}

// ================= ENCODE =================
function encode() {
  let input = document.getElementById("input").value;
  let result = [];

  for (let i = 0; i < input.length; i++) {
    let char = input[i];

    // SPACE
    if (char === " ") {
      if (result.length > 0) {
        result[result.length - 1] += ":";
      }
      continue;
    }

    // NUMBER (supports commas)
    if (!isNaN(char) && char !== " ") {
      let num = char;

      while (
        i + 1 < input.length &&
        ( (!isNaN(input[i + 1])) || input[i + 1] === "," )
      ) {
        num += input[++i];
      }

      // Check if commas exist
      if (num.includes(",")) {
        if (isValidCommaNumber(num)) {
          let clean = num.replace(/,/g, "");
          result.push("NC" + clean);
        } else {
          // ❌ INVALID → fallback to ASCII
          for (let c of num) {
            result.push("A" + c.codePointAt(0));
          }
        }
      } else {
        result.push("N" + num);
      }

      continue;
    }

    let isCapital = char === char.toUpperCase() && char !== char.toLowerCase();
    let lower = char.toLowerCase();
    let index = alphabet.indexOf(lower);

    // LETTER
    if (index !== -1) {
      let group13 = index < 13 ? 1 : 2;
      let within13 = index % 13;

      let group6 = within13 < 6 ? 1 : 2;
      let position = within13 < 6 ? within13 + 1 : within13 - 5;

      let code = `${group13}${group6}${position}`;
      if (isCapital) code = "C" + code;

      result.push(code);
      continue;
    }

    // ASCII / UNICODE
    result.push("A" + char.codePointAt(0));
  }

  document.getElementById("output").value = result.join(";");
}


// ================= DECODE =================
function decode() {
  let input = document.getElementById("input").value;
  let parts = input.split(";");
  let result = "";

  for (let part of parts) {
    if (!part) continue;

    let hasSpace = part.endsWith(":");
    if (hasSpace) part = part.slice(0, -1);

    let subParts = part.split(" ");

    for (let sub of subParts) {
      if (!sub) continue;

      // NUMBER WITH COMMAS
      if (sub.startsWith("NC")) {
        let num = sub.slice(2);
        let parsed = Number(num);

        if (!isNaN(parsed)) {
          result += parsed.toLocaleString();
        }
        continue;
      }

      // NUMBER
      if (sub.startsWith("N")) {
        result += sub.slice(1);
        continue;
      }

      // ASCII / UNICODE
      if (sub.startsWith("A")) {
        let code = parseInt(sub.slice(1));
        if (!isNaN(code)) {
          result += String.fromCodePoint(code);
        }
        continue;
      }

      // CAPITAL
      let isCapital = false;
      if (sub.startsWith("C")) {
        isCapital = true;
        sub = sub.slice(1);
      }

      // LETTER
      if (sub.length === 3) {
        let g13 = parseInt(sub[0]);
        let g6 = parseInt(sub[1]);
        let pos = parseInt(sub[2]);

        let baseIndex = (g13 === 1 ? 0 : 13);
        let within13 = g6 === 1 ? pos - 1 : pos + 5;
        let index = baseIndex + within13;

        let letter = alphabet[index];

        if (letter) {
          if (isCapital) letter = letter.toUpperCase();
          result += letter;
        }
      }
    }

    if (hasSpace) result += " ";
  }

  document.getElementById("output").value = result;
}
</script>

</body>
</html>
